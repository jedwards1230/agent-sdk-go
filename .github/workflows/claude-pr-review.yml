name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  actions: read
  pull-requests: write
  id-token: write

jobs:
  review:
    uses: jedwards1230/release-workflows/.github/workflows/claude-pr-review.yml@0c57d2b2c7cb044adaa1f3a070192677ab1f3bfd # v1
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }} # preferred (subscription)
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }} # fallback (metered API)
    with:
      extra_plugins: go-quality@jedwards1230-plugins
      focus: |
        agent-sdk-go is an importable, provider-agnostic agent framework for Go —
        an owned agent loop with a typed Event/Op contract that every client
        (TUI, ACP, headless) consumes; the two-tier event broker (lossy deltas,
        must-deliver terminals) is the concurrency-critical core. Highest-value
        lenses: public API design + godoc accuracy (this is a library — every
        exported symbol is contract), concurrency correctness in the broker and
        session paths (races, blocking bounds, drop accounting), event-contract
        compatibility (a new or changed event kind is an API change and must be
        documented), and golden-file test coverage for stream-shape changes.
        Do NOT re-flag gofmt/go vet/golangci-lint findings — CI owns those.
